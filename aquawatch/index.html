        const SERVICE_TYPES = {

        // Helper: Calculate distance between two points (Haversine formula)
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Find nearest services
        function findNearestServices(userLocation, maxResults = 3) {
            const servicesWithDistance = emergencyServices.map(service => ({
                ...service,
                distance: calculateDistance(userLocation.lat, userLocation.lng, service.lat, service.lng)
            }));
            return servicesWithDistance.sort((a, b) => a.distance - b.distance).slice(0, maxResults);
        }

        // Calculate risk zones (cluster reports by proximity)
        function calculateRiskZones(reports) {
            const zones = [];
            const processedIds = new Set();

            reports.forEach(report => {
                if (processedIds.has(report.id)) return;

                const nearbyReports = reports.filter(r => {
                    if (processedIds.has(r.id)) return false;
                    const dist = calculateDistance(report.latitude, report.longitude, r.latitude, r.longitude);
                    return dist <= 1; // Within 1km
                });

                if (nearbyReports.length >= 2) {
                    nearbyReports.forEach(id => processedIds.add(id.id));
                    const avgLat = nearbyReports.reduce((sum, r) => sum + r.latitude, 0) / nearbyReports.length;
                    const avgLng = nearbyReports.reduce((sum, r) => sum + r.longitude, 0) / nearbyReports.length;

                    let riskLevel = 'low';
                    if (nearbyReports.length > 5) riskLevel = 'high';
                    else if (nearbyReports.length > 3) riskLevel = 'medium';

                    zones.push({
                        lat: avgLat,
                        lng: avgLng,
                        count: nearbyReports.length,
                        riskLevel,
                        reports: nearbyReports
                    });
                }
            });

            return zones;
        }

        // Detect clusters of similar reports
        function detectClusters(reports) {
            const clusters = {};
            reports.forEach(report => {
                const key = report.crisisType || report.category;
                if (!clusters[key]) clusters[key] = [];
                clusters[key].push(report);
            });

            const detectedClusters = [];
            Object.entries(clusters).forEach(([type, typeReports]) => {
                const processed = new Set();
                typeReports.forEach(report => {
                    if (processed.has(report.id)) return;
                    const nearby = typeReports.filter(r => {
                        if (processed.has(r.id)) return false;
                        return calculateDistance(report.latitude, report.longitude, r.latitude, r.longitude) <= 0.5;
                    });
                    if (nearby.length >= 2) {
                        nearby.forEach(r => processed.add(r.id));
                        detectedClusters.push({
                            type,
                            count: nearby.length,
                            center: {
                                lat: nearby.reduce((s, r) => s + r.latitude, 0) / nearby.length,
                                lng: nearby.reduce((s, r) => s + r.longitude, 0) / nearby.length
                            }
                        });
                    }
                });
            });

            return detectedClusters;
        }

        // Check nearby alerts
        function checkNearbyAlerts(userLocation, reports) {
            return reports.filter(r => {
                const dist = calculateDistance(userLocation.lat, userLocation.lng, r.latitude, r.longitude);
                return dist <= 1 && (r.severity === 'high' || r.severity === 'medium');
            });
        }

        // Simulated AI image analysis
        function analyzeImage(fileName) {
            const lowerName = fileName.toLowerCase();
            if (lowerName.includes('smoke') || lowerName.includes('fire') || lowerName.includes('flame')) {
                return { type: 'Fire', confidence: 85, icon: '🔥' };
            }
            if (lowerName.includes('water') || lowerName.includes('flood') || lowerName.includes('wet')) {
                return { type: 'Flood', confidence: 80, icon: '🌊' };
            }
            if (lowerName.includes('crack') || lowerName.includes('break') || lowerName.includes('damage')) {
                return { type: 'Building Damage', confidence: 75, icon: '🏚️' };
            }
            if (lowerName.includes('sewage') || lowerName.includes('drain') || lowerName.includes('dirty')) {
                return { type: 'Open Drainage', confidence: 78, icon: '🕳️' };
            }
            return { type: 'General Issue', confidence: 60, icon: '⚠️' };
        }

            { id: '5', category: 'CONTAMINATED_WATER', crisisType: 'water', description: 'Industrial waste being dumped into Bellandur lake. Water turning green and smelling bad.', latitude: 12.9542, longitude: 77.6746, address: 'Bellandur, Bengaluru', status: 'OPEN', severity: 'high', riskScore: 95, reporterName: 'Mohammed Ali', photo: null, timestamp: Date.now() - 432000000 },

        // Image compression helper (max 500KB)
        function compressImage(file, maxSizeKB = 500, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        const maxDim = 800;
                        if (width > maxDim || height > maxDim) {
                            if (width > height) {
                                height = (height / width) * maxDim;
                                width = maxDim;
                            } else {
                                width = (width / height) * maxDim;
                                height = maxDim;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        let base64 = canvas.toDataURL('image/jpeg', quality);
                        
                        while (base64.length > maxSizeKB * 1024 * 1.37 && quality > 0.2) {
                            quality -= 0.1;
                            base64 = canvas.toDataURL('image/jpeg', quality);
                        }
                        
                        resolve(base64);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // Context
        const AppContext = createContext();

        function AppProvider({ children }) {
            const [reports, setReports] = useState(() => {

            });
            const [toast, setToast] = useState(null);
            const [sosActive, setSosActive] = useState(false);
            const [sosLocation, setSosLocation] = useState(null);
            const [sosLoading, setSosLoading] = useState(false);

            useEffect(() => { 
                localStorage.setItem('aquawatch_reports_bengaluru', JSON.stringify(reports)); 
            }, [reports]);

            useEffect(() => { 
                localStorage.setItem('aquawatch_user_profile', JSON.stringify(currentUser)); 
            }, [currentUser]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const updateUser = (updates) => {
                setCurrentUser(prev => ({ ...prev, ...updates }));
                showToast('✅ Profile updated successfully!', 'info');
            };

            const addReport = (reportData) => {
                const newReport = { 
                    ...reportData, 
                    id: Date.now().toString(), 
                    status: 'OPEN', 
                    riskScore: Math.floor(Math.random() * 40) + 60, 
                    reporterName: currentUser.name 
                };
                setReports([newReport, ...reports]);
                setCurrentUser(prev => ({ ...prev, points: prev.points + 10, reportsCount: prev.reportsCount + 1 }));
                showToast('🎉 Report submitted! +10 points earned!', 'success');
            };

            const updateStatus = (id, status) => {
                setReports(reports.map(r => r.id === id ? { ...r, status } : r));
                showToast(`Status updated to ${STATUSES[status].name}!`, 'info');
            };

            // SOS Functions
            const triggerSOS = () => {
                setSosLoading(true);
                
                if (!navigator.geolocation) {
                    showToast('⚠️ Geolocation not supported by your browser', 'error');
                    setSosLoading(false);
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const location = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            timestamp: Date.now()
                        };
                        setSosLocation(location);
                        
                        // Save SOS event to localStorage
                        const sosEvents = JSON.parse(localStorage.getItem('aquawatch_sos_events') || '[]');
                        const newSOSEvent = {
                            id: Date.now().toString(),
                            type: 'SOS',
                            location: location,
                            userName: currentUser.name,
                            timestamp: Date.now()
                        };
                        sosEvents.unshift(newSOSEvent);
                        localStorage.setItem('aquawatch_sos_events', JSON.stringify(sosEvents.slice(0, 10)));
                        
                        setSosActive(true);
                        setSosLoading(false);
                        showToast('🚨 SOS activated! Help is on the way!', 'success');
                    },
                    (error) => {
                        console.error('Geolocation error:', error);
                        setSosLoading(false);
                        showToast('⚠️ Could not get your location. Please enable GPS.', 'error');
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };

            const closeSOS = () => {
                setSosActive(false);
                setSosLocation(null);
            };

            return (
                <AppContext.Provider value={{ reports, addReport, updateStatus, currentUser, updateUser, CATEGORIES, STATUSES, BADGES, CRISIS_TYPES, SEVERITY_LEVELS, showToast, sosActive, sosLocation, sosLoading, triggerSOS, closeSOS }}>

                            {toast.message}

                    {/* SOS Modal */}
                    {sosActive && (

                                            <p className="text-red-800 font-bold">

        function MapView() {
            const { reports, CATEGORIES, STATUSES, CRISIS_TYPES } = useContext(AppContext);
            const mapRef = useRef(null);
            const markersRef = useRef([]);

            useEffect(() => {
                if (!mapRef.current) {
                    mapRef.current = L.map('map', { zoomControl: false }).setView([12.9716, 77.5946], 12);
                    L.control.zoom({ position: 'topright' }).addTo(mapRef.current);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors',
                        maxZoom: 19
                    }).addTo(mapRef.current);
                }

                markersRef.current.forEach(m => m.remove());
                markersRef.current = [];

                reports.forEach((report, index) => {
                    const cat = CATEGORIES[report.category] || CATEGORIES.OTHER;
                    const crisis = CRISIS_TYPES[report.crisisType] || CRISIS_TYPES.water;
                    const severity = SEVERITY_LEVELS[report.severity] || SEVERITY_LEVELS.medium;
                    const statusColor = report.status === 'RESOLVED' ? '#22c55e' : crisis.color;
                    
                    const icon = L.divIcon({
                        html: `<div class="custom-marker" style="background: ${statusColor}; animation-delay: ${index * 0.1}s">${crisis.icon}</div>`,
                        className: '',
                        iconSize: [50, 50],
                        iconAnchor: [25, 25],
                        popupAnchor: [0, -25]
                    });

                    const photoHtml = report.photo 
                        ? `<img src="${report.photo}" alt="Report photo" class="popup-image" />`
                        : `<div class="popup-no-image">📷 No photo attached</div>`;

                    const timestamp = report.timestamp ? new Date(report.timestamp).toLocaleString() : 'N/A';

                    const marker = L.marker([report.latitude, report.longitude], { icon })
                        .addTo(mapRef.current)
                        .bindPopup(`
                            <div class="p-3 min-w-[280px]">
                                ${photoHtml}
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-3xl">${crisis.icon}</span>
                                    <div class="flex flex-col gap-1 items-end">

                                <p class="text-sm text-gray-600 mt-2">${report.description}</p>
                                <div class="mt-3 pt-3 border-t space-y-1 text-sm text-gray-600">

                                    <p class="flex items-center gap-2">👤 ${report.reporterName}</p>
                                    <p class="flex items-center gap-2">⏰ ${timestamp}</p>
                                    <p class="flex items-center gap-2">📊 Risk Score: <span class="font-bold ${report.riskScore >= 70 ? 'text-red-600' : report.riskScore >= 40 ? 'text-orange-600' : 'text-green-600'}">${report.riskScore}/100</span></p>
                                </div>
                            </div>
                        `, { className: 'custom-popup', maxWidth: 320 });
                    markersRef.current.push(marker);
                });
            }, [reports]);

            return (
                <div className="space-y-6">
                    <div className="glass rounded-2xl shadow-xl p-6 scale-in">
                        <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center space-x-3">
                                <div className="w-12 h-12 bg-gradient-to-br from-cyan-500 to-blue-500 rounded-xl flex items-center justify-center shadow-lg">
                                    <span className="text-2xl">🗺️</span>
                                </div>
                                <div>

        function ReportForm() {
            const { addReport, CATEGORIES, CRISIS_TYPES, SEVERITY_LEVELS, currentUser } = useContext(AppContext);

            const [crisisType, setCrisisType] = useState('water');

            const [address, setAddress] = useState('');
            const [photo, setPhoto] = useState(null);
            const [photoPreview, setPhotoPreview] = useState(null);
            const [isCompressing, setIsCompressing] = useState(false);
            const fileInputRef = useRef(null);

            const handlePhotoChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    alert('Please select a valid image file!');
                    return;
                }

                if (file.size > 10 * 1024 * 1024) {
                    alert('Image is too large! Please select an image under 10MB.');
                    return;
                }

                setIsCompressing(true);
                
                try {
                    const compressedBase64 = await compressImage(file, 500, 0.7);
                    setPhoto(compressedBase64);
                    setPhotoPreview(compressedBase64);
                } catch (error) {
                    console.error('Error processing image:', error);
                    alert('Error processing image. Please try again.');
                } finally {
                    setIsCompressing(false);
                }
            };

            const removePhoto = () => {
                setPhoto(null);
                setPhotoPreview(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!category || !description) { 
                    alert('Please fill all required fields!'); 
                    return;

                let finalPhoto = null;
                if (photo) {
                    setIsCompressing(true);
                    try {

                        console.error('Error compressing final photo:', error);

                    setIsCompressing(false);

                addReport({

                setCategory('');
                setCrisisType('water');
                setSeverity('medium');
                setDescription('');
                setAddress('');
                setPhoto(null);
                setPhotoPreview(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                }

        function getAIResponse(message) {
            const lowerMsg = message.toLowerCase();
            
            if (lowerMsg.match(/^(hi|hello|hey|namaste|greetings)/)) {
                return AI_RESPONSES.greeting[Math.floor(Math.random() * AI_RESPONSES.greeting.length)];
            }
            // Fire safety
            if (lowerMsg.match(/fire|flame|burn|smoke|blaze|🔥/)) {
                return AI_RESPONSES.fire_safety[Math.floor(Math.random() * AI_RESPONSES.fire_safety.length)];
            }

            if (lowerMsg.match(/earthquake|tremor|quake|seismic|shaking/)) {
                return AI_RESPONSES.earthquake_safety[Math.floor(Math.random() * AI_RESPONSES.earthquake_safety.length)];

                return AI_RESPONSES.flood_safety[Math.floor(Math.random() * AI_RESPONSES.flood_safety.length)];

                return AI_RESPONSES.water_safety[Math.floor(Math.random() * AI_RESPONSES.water_safety.length)];

                return AI_RESPONSES.contamination[Math.floor(Math.random() * AI_RESPONSES.contamination.length)];
            }
            if (lowerMsg.match(/wash.*hand|hand.*wash|soap|sanitizer|disinfect/)) {
                return AI_RESPONSES.hygiene[Math.floor(Math.random() * AI_RESPONSES.hygiene.length)];
            }

            const byType = {};

            reports.forEach(r => {
                byType[r.category] = (byType[r.category] || 0) + 1;
                byStatus[r.status] = (byStatus[r.status] || 0) + 1;
                bySeverity[r.severity] = (bySeverity[r.severity] || 0) + 1;
            });

            return { byType, byStatus, bySeverity, total: reports.length };
        }

            const saved = localStorage.getItem('aquawatch_pending_reports');
            return saved ? JSON.parse(saved) : [];
        });
        const [isOnline, setIsOnline] = useState(navigator.onLine);

        useEffect(() => {
            const handleOnline = () => {
                setIsOnline(true);
                syncOfflineReports();
            };
            const handleOffline = () => setIsOnline(false);
            window.addEventListener('online', handleOnline);
            window.addEventListener('offline', handleOffline);
            return () => {
                window.removeEventListener('online', handleOnline);
                window.removeEventListener('offline', handleOffline);
            };
        }, []);

            localStorage.setItem('aquawatch_pending_reports', JSON.stringify(pendingReports));

                    <div className="glass rounded-2xl shadow-xl p-6">
                        <h3 className="font-bold text-gray-800 text-lg mb-4">📊 Crisis Type Breakdown</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                            {Object.entries(stats.byType).map(([type, count]) => (
                                <div key={type} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                                    <span className="text-2xl">{CRISIS_TYPES[type]?.icon || '⚠️'}</span>
                                    <div>
                                        <p className="font-semibold text-gray-800">{CATEGORIES[type]?.name || type}</p>
                                        <p className="text-sm text-gray-600">{count} reports</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Severity Breakdown */}
                    <div className="glass rounded-2xl shadow-xl p-6">
                        <h3 className="font-bold text-gray-800 text-lg mb-4">⚠️ Severity Distribution</h3>
                        <div className="grid grid-cols-3 gap-4">
                            {Object.entries(stats.bySeverity).map(([level, count]) => (
                                <div key={level} className={`rounded-xl p-4 text-center ${SEVERITY_LEVELS[level].bgColor}`}>
                                    <p className={`text-3xl font-bold ${SEVERITY_LEVELS[level].textColor}`}>{count}</p>
                                    <p className={`font-semibold ${SEVERITY_LEVELS[level].textColor}`}>{SEVERITY_LEVELS[level].name}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Find Help Section */}
                    <div className="glass rounded-2xl shadow-xl p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="font-bold text-gray-800 text-lg">📍 Find Nearest Emergency Services</h3>
                            <button onClick={getUserLocation} className="btn-primary px-4 py-2 rounded-xl text-white font-semibold text-sm">
                                📍 Get Location
                            </button>
                        </div>
                        {currentLocation && (
                            <p className="text-sm text-gray-600 mb-3">📍 Your location: {currentLocation.lat.toFixed(4)}, {currentLocation.lng.toFixed(4)}</p>
                        )}
                        <div className="space-y-2">
                            {nearestServices.map((service, i) => (
                                <div key={service.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                                    <div className="flex items-center gap-3">
                                        <span className="text-2xl">{SERVICE_TYPES[service.type]?.icon}</span>
                                        <div>
                                            <p className="font-semibold text-gray-800">{service.name}</p>
                                            <p className="text-sm text-gray-600">{service.phone}</p>
                                        </div>
                                    </div>
                                    <span className="font-bold text-cyan-600">{service.distance.toFixed(1)} km</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Nearby Alerts */}
                    {nearbyAlerts.length > 0 && (
                        <div className="glass rounded-2xl shadow-xl p-6 bg-red-50 border-2 border-red-200">
                            <h3 className="font-bold text-red-800 text-lg mb-4">⚠️ Nearby High-Risk Reports</h3>
                            {nearbyAlerts.map(alert => (
                                <div key={alert.id} className="p-3 bg-white rounded-xl mb-2 border border-red-200">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xl">{CRISIS_TYPES[alert.crisisType]?.icon}</span>
                                            <p className="font-semibold text-gray-800">{alert.description.substring(0, 50)}...</p>
                                        </div>
                                        <span className={`px-2 py-1 rounded-full text-xs font-bold ${SEVERITY_LEVELS[alert.severity].bgColor} ${SEVERITY_LEVELS[alert.severity].textColor}`}>
                                            {SEVERITY_LEVELS[alert.severity].name}
                                        </span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // Hygiene Tips Rotating Banner
        const HYGIENE_TIPS = [
            { icon: '🧼', tip: 'Wash hands for 20+ seconds with soap' },
            { icon: '💧', tip: 'Drink 8 glasses of clean water daily' },
            { icon: '🚽', tip: 'Keep toilet areas clean and disinfected' },
            { icon: '🗑️', tip: 'Dispose waste properly - no dumping in drains' },
            { icon: '🚿', tip: 'Take bath daily to maintain personal hygiene' },
            { icon: '🦟', tip: 'Eliminate stagnant water to prevent mosquito breeding' },
            { icon: '🥤', tip: 'Use clean containers for drinking water' },
            { icon: '🏊', tip: 'Avoid swimming in potentially contaminated water' },
            { icon: '👟', tip: 'Wear footwear near toilet areas to prevent infection' },
            { icon: '🧴', tip: 'Use hand sanitizer when soap is unavailable' },
            { icon: '💉', tip: 'Seek medical help if symptoms persist after 2 days' },
            { icon: '📢', tip: 'Report WASH issues to help your community' }
        ];

        function HygieneTips() {
            const [currentTip, setCurrentTip] = useState(0);
            
            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentTip(prev => (prev + 1) % HYGIENE_TIPS.length);
                }, 8000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="fixed bottom-0 left-0 right-0 bg-slate-900 py-4 px-6 shadow-2xl z-40" style={{background: 'linear-gradient(to right, #0f172a, #1e293b)'}}>
                    <div className="max-w-7xl mx-auto flex items-center justify-center space-x-4">
                        <div className="text-3xl animate-pulse" style={{filter: 'drop-shadow(0 0 8px rgba(34, 211, 238, 0.8))'}}>💡</div>
                        <p className="text-lg font-bold tracking-wide" style={{color: '#22d3ee', textShadow: '0 0 10px rgba(34, 211, 238, 0.5), 0 2px 4px rgba(0,0,0,0.5)'}}>
                            {HYGIENE_TIPS[currentTip].tip}
                        </p>
                        <div className="flex space-x-1">
                            {HYGIENE_TIPS.map((_, i) => (
                                <span key={i} className={`w-2.5 h-2.5 rounded-full transition-all duration-300 ${i === currentTip ? 'bg-cyan-400 shadow-lg shadow-cyan-400/50' : 'bg-slate-500'}`}></span>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ChatGPT-style Chatbot Component
        function ChatBot() {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: "Hello! I'm your WASH assistant. I can help with:\n• Water safety & quality\n• Hygiene tips\n• Sanitation issues\n• Health concerns\n\nWhat would you like to know?", time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;

                const userMessage = { role: 'user', content: input, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsTyping(true);

                // Simulate AI thinking
                setTimeout(() => {
                    const response = getAIResponse(input);
                    setMessages(prev => [...prev, { role: 'assistant', content: response, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
                    setIsTyping(false);
                }, 800 + Math.random() * 700);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6 pb-24">
                    {/* Chat Header */}
                    <div className="glass rounded-2xl shadow-xl p-6 scale-in">
                        <div className="flex items-center space-x-4">
                            <div className="w-14 h-14 bg-gradient-to-br from-cyan-500 to-blue-500 rounded-2xl flex items-center justify-center shadow-lg">
                                <span className="text-2xl">💬</span>
                            </div>
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">WASH Assistant</h2>
                                <p className="text-sm text-gray-600 font-medium">Ask about water, hygiene, and sanitation</p>
                            </div>
                            <div className="ml-auto flex items-center space-x-2">
                                <span className="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                                <span className="text-sm font-semibold text-green-600">Online</span>
                            </div>
                        </div>
                    </div>

                    {/* Chat Messages */}
                    <div className="glass rounded-2xl shadow-xl overflow-hidden slide-up" style={{ height: '500px' }}>
                        <div className="h-full overflow-y-auto p-6 space-y-4 bg-gray-50">
                            {messages.map((msg, i) => (
                                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] rounded-2xl p-4 ${msg.role === 'user' 
                                        ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white rounded-br-md' 
                                        : 'bg-white shadow-md border border-gray-200 rounded-bl-md'}`}>
                                        <p className="text-sm whitespace-pre-wrap leading-relaxed">{msg.content}</p>
                                        <p className={`text-xs mt-2 ${msg.role === 'user' ? 'text-cyan-100' : 'text-gray-400'}`}>{msg.time}</p>
                                    </div>
                                </div>
                            ))}
                            
                            {isTyping && (
                                <div className="flex justify-start">
                                    <div className="bg-white shadow-md border border-gray-200 rounded-2xl rounded-bl-md p-4">
                                        <div className="flex space-x-1">
                                            <span className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></span>
                                            <span className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></span>
                                            <span className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></span>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            <div ref={chatEndRef} />
                        </div>
                        
                        {/* Input Area */}
                        <div className="p-4 bg-white border-t border-gray-200">
                            <div className="flex space-x-3">
                                <input 
                                    type="text" 
                                    value={input} 
                                    onChange={e => setInput(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                    placeholder="Ask about water safety, hygiene tips..."
                                    className="flex-1 px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 text-gray-800"
                                />
                                <button 
                                    onClick={handleSend}
                                    disabled={!input.trim()}
                                    className="btn-primary px-6 py-3 rounded-xl text-white font-bold shadow disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    Send
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Quick Questions */}
                    <div className="glass rounded-2xl shadow-xl p-6 slide-up">
                        <h3 className="font-bold text-gray-800 mb-4">Quick Questions</h3>
                        <div className="flex flex-wrap gap-2">
                            {[
                                "How to check water quality?",
                                "Hand washing tips",
                                "Report sanitation issue",
                                "Water contamination signs",
                                "Health symptoms from dirty water",
                                "Emergency water situation"
                            ].map((q, i) => (
                                <button 
                                    key={i}
                                    onClick={() => setInput(q)}
                                    className="px-4 py-2 bg-gradient-to-r from-gray-100 to-gray-50 rounded-xl text-sm font-medium text-gray-700 hover:from-cyan-100 hover:to-blue-100 hover:text-cyan-700 transition-all border border-gray-200 hover:border-cyan-300"
                                >
                                    {q}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function Profile() {
            const { currentUser, updateUser, BADGES } = useContext(AppContext);
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState(currentUser);
            const [profilePhoto, setProfilePhoto] = useState(null);
            const fileInputRef = useRef(null);

            const handlePhotoChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    alert('Please select a valid image file!');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    setProfilePhoto(e.target.result);
                    setFormData(prev => ({ ...prev, photo: e.target.result }));
                };
                reader.readAsDataURL(file);
            };

            const handleSave = () => {
                updateUser(formData);
                setIsEditing(false);
            };

            const handleCancel = () => {
                setFormData(currentUser);
                setProfilePhoto(null);
                setIsEditing(false);
            };

            return (
                <div className="max-w-3xl mx-auto space-y-6">
                    {/* Profile Header */}
                    <div className="glass rounded-2xl shadow-xl p-8 scale-in">
                        <div className="flex items-start space-x-6">
                            {/* Profile Photo */}
                            <div className="relative">
                                <div className="w-32 h-32 rounded-2xl overflow-hidden shadow-xl border-4 border-cyan-200 bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center">
                                    {profilePhoto || currentUser.photo ? (
                                        <img src={profilePhoto || currentUser.photo} alt="Profile" className="w-full h-full object-cover" />
                                    ) : (
                                        <span className="text-6xl">👤</span>
                                    )}
                                </div>
                                {isEditing && (
                                    <>
                                        <input 
                                            type="file" 
                                            accept="image/*"
                                            ref={fileInputRef}
                                            onChange={handlePhotoChange}
                                            style={{ display: 'none' }}
                                        />
                                        <button
                                            onClick={() => fileInputRef.current?.click()}
                                            className="absolute bottom-0 right-0 w-10 h-10 bg-cyan-500 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-cyan-600 transition-colors text-lg font-bold"
                                        >
                                            📷
                                        </button>
                                    </>
                                )}
                            </div>

                            {/* User Info */}
                            <div className="flex-1">
                                {isEditing ? (
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-800 mb-2">Full Name</label>
                                            <input 
                                                type="text" 
                                                value={formData.name}
                                                onChange={e => setFormData({...formData, name: e.target.value})}
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800 font-semibold"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-800 mb-2">Bio</label>
                                            <textarea 
                                                value={formData.bio || ''}
                                                onChange={e => setFormData({...formData, bio: e.target.value})}
                                                rows={2}
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800"
                                            />
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        <h2 className="text-3xl font-bold text-gray-800">{currentUser.name}</h2>
                                        <p className="text-gray-600 font-medium mt-1">{currentUser.bio || 'No bio added yet'}</p>
                                        <div className="flex items-center gap-4 mt-3 text-gray-700 font-medium">
                                            <span className="flex items-center gap-1">📅 Joined {currentUser.joinedDate}</span>
                                            <span className="flex items-center gap-1">📍 {currentUser.location}</span>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        {/* Stats */}
                        <div className="grid grid-cols-4 gap-4 mt-6 pt-6 border-t-2 border-gray-200">
                            <div className="text-center p-4 bg-gradient-to-br from-cyan-50 to-blue-50 rounded-xl border border-cyan-200">
                                <p className="text-3xl font-bold text-cyan-700">{currentUser.points}</p>
                                <p className="text-sm font-semibold text-cyan-600">Points</p>
                            </div>
                            <div className="text-center p-4 bg-gradient-to-br from-green-50 to-emerald-50 rounded-xl border border-green-200">
                                <p className="text-3xl font-bold text-green-700">{currentUser.reportsCount}</p>
                                <p className="text-sm font-semibold text-green-600">Reports</p>
                            </div>
                            <div className="text-center p-4 bg-gradient-to-br from-yellow-50 to-orange-50 rounded-xl border border-yellow-200">
                                <p className="text-3xl font-bold text-yellow-700">{currentUser.badges.length}</p>
                                <p className="text-sm font-semibold text-yellow-600">Badges</p>
                            </div>
                            <div className="text-center p-4 bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl border border-purple-200">
                                <p className="text-3xl font-bold text-purple-700">{Math.round(currentUser.points / 10)}</p>
                                <p className="text-sm font-semibold text-purple-600">Impact</p>
                            </div>
                        </div>

                        {/* Badges */}
                        <div className="mt-6 pt-6 border-t-2 border-gray-200">
                            <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                                <span>🏅</span> Your Badges
                            </h3>
                            <div className="flex flex-wrap gap-3">
                                {currentUser.badges.map((badge, i) => (
                                    <div key={i} className="flex items-center space-x-2 px-4 py-2 bg-gradient-to-r from-cyan-50 to-blue-50 rounded-xl border border-cyan-200">
                                        <span className="text-2xl">{BADGES[badge]?.icon}</span>
                                        <span className="font-semibold text-gray-800">{BADGES[badge]?.name}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Edit Button */}
                        <div className="mt-6">
                            {isEditing ? (
                                <div className="flex gap-3">
                                    <button onClick={handleSave} className="btn-primary flex-1 py-3 rounded-xl text-white font-bold text-lg shadow">
                                        💾 Save Changes
                                    </button>
                                    <button onClick={handleCancel} className="btn-secondary px-6 py-3 rounded-xl text-white font-bold text-lg shadow">
                                        Cancel
                                    </button>
                                </div>
                            ) : (
                                <button onClick={() => setIsEditing(true)} className="w-full btn-primary py-3 rounded-xl text-white font-bold text-lg shadow">
                                    ✏️ Edit Profile
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Contact Information */}
                    <div className="glass rounded-2xl shadow-xl p-8 slide-up">
                        <h3 className="font-bold text-gray-800 text-xl mb-6 flex items-center gap-2">
                            <span>📋</span> Contact Information
                        </h3>
                        <div className="space-y-4">
                            {isEditing ? (
                                <>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-800 mb-2">Email</label>
                                        <input 
                                            type="email" 
                                            value={formData.email}
                                            onChange={e => setFormData({...formData, email: e.target.value})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-800 mb-2">Phone</label>
                                        <input 
                                            type="tel" 
                                            value={formData.phone}
                                            onChange={e => setFormData({...formData, phone: e.target.value})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-800 mb-2">Location</label>
                                        <input 
                                            type="text" 
                                            value={formData.location}
                                            onChange={e => setFormData({...formData, location: e.target.value})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800"
                                        />
                                    </div>
                                </>
                            ) : (
                                <>
                                    <div className="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-200">
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">📧</span>
                                            <span className="font-semibold text-gray-800">Email</span>
                                        </div>
                                        <span className="text-gray-700 font-medium">{currentUser.email}</span>
                                    </div>
                                    <div className="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-200">
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">📱</span>
                                            <span className="font-semibold text-gray-800">Phone</span>
                                        </div>
                                        <span className="text-gray-700 font-medium">{currentUser.phone}</span>
                                    </div>
                                    <div className="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-200">
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">📍</span>
                                            <span className="font-semibold text-gray-800">Location</span>
                                        </div>
                                        <span className="text-gray-700 font-medium">{currentUser.location}</span>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('map');
            return (
                <AppProvider>
                    <div className="min-h-screen">
                        <Header activeTab={activeTab} setActiveTab={setActiveTab} />
                        <main className="max-w-7xl mx-auto px-4 py-8">
                            <div className="fade-in">
                                {activeTab === 'map' && <MapView />}
                                {activeTab === 'report' && <ReportForm />}
                                {activeTab === 'dashboard' && <Dashboard />}
                                {activeTab === 'leaderboard' && <Leaderboard />}
                                {activeTab === 'chat' && <ChatBot />}
                                {activeTab === 'admin' && <AdminPanel />}
                                {activeTab === 'profile' && <Profile />}
                            </div>
                        </main>
                        <HygieneTips />
                        <footer className="text-center py-6 text-gray-600 text-sm font-medium">
                            <p>Built with 💙 for Bengaluru's Water & Sanitation | AquaWatch © 2024</p>
                        </footer>
                    </div>
                </AppProvider>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
