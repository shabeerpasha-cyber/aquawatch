<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaWatch - Water & Sanitation Monitoring | Bengaluru</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { margin: 0; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%); min-height: 100vh; }
        
        /* Smooth Animations */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .scale-in { animation: scaleIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        .glow { animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px rgba(6, 182, 212, 0.3); } to { box-shadow: 0 0 20px rgba(6, 182, 212, 0.6); } }
        
        .leaflet-container { height: 500px; width: 100%; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .custom-marker { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: transform 0.3s ease; cursor: pointer; }
        .custom-marker:hover { transform: scale(1.2) rotate(10deg); }
        
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        
        .nav-btn { position: relative; overflow: hidden; }
        .nav-btn::after { content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 3px; background: linear-gradient(90deg, #06b6d4, #3b82f6); transition: all 0.3s ease; transform: translateX(-50%); border-radius: 2px; }
        .nav-btn:hover::after, .nav-btn.active::after { width: 60%; }
        .nav-btn.active { background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(59, 130, 246, 0.2)); }
        
        .btn-primary { background: linear-gradient(135deg, #06b6d4, #0891b2); transition: all 0.3s ease; position: relative; overflow: hidden; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(6, 182, 212, 0.4); }
        .btn-primary:active { transform: translateY(0); }
        
        .btn-secondary { background: linear-gradient(135deg, #6b7280, #4b5563); transition: all 0.3s ease; }
        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(107, 114, 128, 0.4); }
        
        .leaderboard-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .leaderboard-card:hover { transform: scale(1.05) rotate(1deg); }
        
        .badge { transition: all 0.3s ease; }
        .badge:hover { transform: scale(1.3) rotate(-10deg); }
        
        .ripple { position: relative; overflow: hidden; }
        .ripple::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; background: rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; }
        .ripple:active::before { width: 300px; height: 300px; }
        
        /* Custom Popup Styles */
        .leaflet-popup-content-wrapper { border-radius: 16px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: auto !important; }
        .popup-image { width: 100%; max-width: 200px; height: 150px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }
        .popup-no-image { width: 100%; max-width: 200px; height: 80px; background: #f3f4f6; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #6b7280; font-size: 12px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useRef } = React;

        // Bengaluru Sample Data with placeholder photos
        const initialReports = [
            { id: '1', category: 'CONTAMINATED_WATER', description: 'Tap water appears brown and has strange odor. Residents reporting stomach issues for past week.', latitude: 12.9716, longitude: 77.5946, address: 'MG Road, Bengaluru', status: 'OPEN', riskScore: 88, reporterName: 'Priya Sharma', photo: null },
            { id: '2', category: 'OPEN_DRAINAGE', description: 'Open sewage near apartment complex. Major health hazard for children playing nearby.', latitude: 12.9352, longitude: 77.6245, address: 'Whitefield, Bengaluru', status: 'INVESTIGATING', riskScore: 75, reporterName: 'Rajesh Kumar', photo: null },
            { id: '3', category: 'BROKEN_FACILITY', description: 'Public toilet at metro station has been non-functional for 3 weeks. Very unsanitary conditions.', latitude: 12.9784, longitude: 77.5718, address: 'Koramangala, Bengaluru', status: 'OPEN', riskScore: 68, reporterName: 'Anita Verma', photo: null },
            { id: '4', category: 'LACK_SOAP', description: 'School washroom completely lacks soap. Children cannot practice basic hygiene.', latitude: 12.9548, longitude: 77.6148, address: 'Indiranagar, Bengaluru', status: 'RESOLVED', riskScore: 42, reporterName: 'Priya Sharma', photo: null },
            { id: '5', category: 'CONTAMINATED_WATER', description: 'Industrial waste being dumped into Bellandur lake. Water turning green and smelling bad.', latitude: 12.9542, longitude: 77.6746, address: 'Bellandur, Bengaluru', status: 'OPEN', riskScore: 95, reporterName: 'Mohammed Ali', photo: null },
            { id: '6', category: 'OPEN_DRAINAGE', description: 'Clogged drainage causing water stagnation. Mosquitoes breeding rapidly in area.', latitude: 13.0013, longitude: 77.5613, address: 'Hebbal, Bengaluru', status: 'OPEN', riskScore: 72, reporterName: 'Sneha Reddy', photo: null },
            { id: '7', category: 'BROKEN_FACILITY', description: 'Public water tank at community center broken. Residents have no water supply for 5 days.', latitude: 12.9105, longitude: 77.6468, address: 'HSR Layout, Bengaluru', status: 'INVESTIGATING', riskScore: 65, reporterName: 'Vikram Singh', photo: null }
        ];

        const CATEGORIES = {
            CONTAMINATED_WATER: { name: 'Contaminated Water', icon: '💧', color: '#ef4444', riskWeight: 10 },
            BROKEN_FACILITY: { name: 'Broken Facility', icon: '🚽', color: '#f97316', riskWeight: 7 },
            OPEN_DRAINAGE: { name: 'Open Drainage', icon: '🕳️', color: '#eab308', riskWeight: 8 },
            LACK_SOAP: { name: 'Lack of Soap', icon: '🧼', color: '#8b5cf6', riskWeight: 5 },
            OTHER: { name: 'Other Issue', icon: '⚠️', color: '#6b7280', riskWeight: 4 }
        };

        const STATUSES = {
            OPEN: { name: 'Open', bgColor: 'bg-red-100', textColor: 'text-red-800', borderColor: 'border-red-500' },
            INVESTIGATING: { name: 'Investigating', bgColor: 'bg-orange-100', textColor: 'text-orange-800', borderColor: 'border-orange-500' },
            RESOLVED: { name: 'Resolved', bgColor: 'bg-green-100', textColor: 'text-green-800', borderColor: 'border-green-500' }
        };

        const BADGES = {
            FIRST_REPORTER: { name: 'First Reporter', icon: '🌊', description: 'Submitted your first report' },
            WATER_GUARDIAN: { name: 'Water Guardian', icon: '🛡️', description: 'Submitted 5 reports' },
            CLEAN_STREETS: { name: 'Clean Streets', icon: '🏆', description: 'Submitted 10 reports' },
            LIFESAVER: { name: 'Lifesaver', icon: '💉', description: 'Submitted 20 reports' }
        };

        // Image compression helper (max 500KB)
        function compressImage(file, maxSizeKB = 500, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        const maxDim = 800;
                        if (width > maxDim || height > maxDim) {
                            if (width > height) {
                                height = (height / width) * maxDim;
                                width = maxDim;
                            } else {
                                width = (width / height) * maxDim;
                                height = maxDim;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        let base64 = canvas.toDataURL('image/jpeg', quality);
                        
                        while (base64.length > maxSizeKB * 1024 * 1.37 && quality > 0.2) {
                            quality -= 0.1;
                            base64 = canvas.toDataURL('image/jpeg', quality);
                        }
                        
                        resolve(base64);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // Context
        const AppContext = createContext();

        function AppProvider({ children }) {
            const [reports, setReports] = useState(() => {
                const saved = localStorage.getItem('aquawatch_reports_bengaluru');
                return saved ? JSON.parse(saved) : initialReports;
            });
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('aquawatch_user_profile');
                return saved ? JSON.parse(saved) : { name: 'Priya Sharma', email: 'priya.sharma@email.com', phone: '+91 98765 43210', location: 'Bengaluru, Karnataka', points: 20, badges: ['FIRST_REPORTER', 'WATER_GUARDIAN'], reportsCount: 2, joinedDate: '2024-01-15', bio: 'Passionate about clean water for all! 🌊' };
            });
            const [toast, setToast] = useState(null);

            useEffect(() => { 
                localStorage.setItem('aquawatch_reports_bengaluru', JSON.stringify(reports)); 
            }, [reports]);

            useEffect(() => { 
                localStorage.setItem('aquawatch_user_profile', JSON.stringify(currentUser)); 
            }, [currentUser]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const updateUser = (updates) => {
                setCurrentUser(prev => ({ ...prev, ...updates }));
                showToast('✅ Profile updated successfully!', 'info');
            };

            const addReport = (reportData) => {
                const newReport = { 
                    ...reportData, 
                    id: Date.now().toString(), 
                    status: 'OPEN', 
                    riskScore: Math.floor(Math.random() * 40) + 60, 
                    reporterName: currentUser.name 
                };
                setReports([newReport, ...reports]);
                setCurrentUser(prev => ({ ...prev, points: prev.points + 10, reportsCount: prev.reportsCount + 1 }));
                showToast('🎉 Report submitted! +10 points earned!', 'success');
            };

            const updateStatus = (id, status) => {
                setReports(reports.map(r => r.id === id ? { ...r, status } : r));
                showToast(`Status updated to ${STATUSES[status].name}!`, 'info');
            };

            return (
                <AppContext.Provider value={{ reports, addReport, updateStatus, currentUser, updateUser, CATEGORIES, STATUSES, BADGES, showToast }}>
                    {children}
                    {toast && (
                        <div className={`fixed top-6 right-6 px-6 py-3 rounded-xl shadow-2xl z-50 scale-in ${toast.type === 'success' ? 'bg-gradient-to-r from-green-500 to-emerald-500' : 'bg-gradient-to-r from-blue-500 to-cyan-500'} text-white font-semibold`}>
                            {toast.message}
                        </div>
                    )}
                </AppContext.Provider>
            );
        }

        // Components
        function Header({ activeTab, setActiveTab }) {
            const { currentUser, BADGES } = useContext(AppContext);
            const tabs = [
                { id: 'map', label: '🗺️ Map', icon: '🗺️' },
                { id: 'report', label: '📝 Report', icon: '📝' },
                { id: 'dashboard', label: '📊 Dashboard', icon: '📊' },
                { id: 'leaderboard', label: '🏆 Leaderboard', icon: '🏆' },
                { id: 'chat', label: '💬 Chat', icon: '💬' },
                { id: 'profile', label: '👤 Profile', icon: '👤' }
            ];

            return (
                <header className="glass shadow-2xl sticky top-0 z-50 fade-in">
                    <div className="max-w-7xl mx-auto px-4 py-4">
                        <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center space-x-4">
                                <div className="relative">
                                    <span className="text-5xl float">🌊</span>
                                    <div className="absolute -top-1 -right-1 w-4 h-4 bg-green-400 rounded-full animate-pulse"></div>
                                </div>
                                <div>
                                    <h1 className="text-3xl font-bold bg-gradient-to-r from-cyan-600 to-blue-600 bg-clip-text text-transparent">AquaWatch</h1>
                                    <p className="text-sm text-gray-600 font-medium">Bengaluru Water & Sanitation Monitoring</p>
                                </div>
                            </div>
                            <div className="glass rounded-2xl px-5 py-3 flex items-center space-x-4 glow">
                                <div className="text-right">
                                    <p className="text-sm font-semibold text-gray-800">{currentUser.name}</p>
                                    <p className="text-lg font-bold bg-gradient-to-r from-cyan-500 to-blue-500 bg-clip-text text-transparent">{currentUser.points} pts</p>
                                </div>
                                <div className="flex space-x-2">
                                    {currentUser.badges.map((b, i) => <span key={i} className="text-2xl badge cursor-pointer" title={BADGES[b]?.name}>{BADGES[b]?.icon}</span>)}
                                </div>
                            </div>
                        </div>
                        <nav className="flex space-x-2 overflow-x-auto pb-1">
                            {tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    className={`nav-btn px-5 py-2.5 rounded-xl font-semibold whitespace-nowrap transition-all duration-300 ${activeTab === tab.id ? 'active text-cyan-600' : 'text-gray-700 hover:text-cyan-500 hover:bg-cyan-50'}`}>
                                    <span className="mr-2">{tab.icon}</span> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </div>
                </header>
            );
        }

        function MapView() {
            const { reports, CATEGORIES, STATUSES } = useContext(AppContext);
            const mapRef = useRef(null);
            const markersRef = useRef([]);

            useEffect(() => {
                if (!mapRef.current) {
                    mapRef.current = L.map('map', { zoomControl: false }).setView([12.9716, 77.5946], 12);
                    L.control.zoom({ position: 'topright' }).addTo(mapRef.current);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors',
                        maxZoom: 19
                    }).addTo(mapRef.current);
                }

                markersRef.current.forEach(m => m.remove());
                markersRef.current = [];

                reports.forEach((report, index) => {
                    const cat = CATEGORIES[report.category] || CATEGORIES.OTHER;
                    const statusColor = report.status === 'RESOLVED' ? '#22c55e' : cat.color;
                    
                    const icon = L.divIcon({
                        html: `<div class="custom-marker" style="background: ${statusColor}; animation-delay: ${index * 0.1}s">${cat.icon}</div>`,
                        className: '',
                        iconSize: [50, 50],
                        iconAnchor: [25, 25],
                        popupAnchor: [0, -25]
                    });

                    const photoHtml = report.photo 
                        ? `<img src="${report.photo}" alt="Report photo" class="popup-image" />`
                        : `<div class="popup-no-image">📷 No photo attached</div>`;

                    const marker = L.marker([report.latitude, report.longitude], { icon })
                        .addTo(mapRef.current)
                        .bindPopup(`
                            <div class="p-3 min-w-[280px]">
                                ${photoHtml}
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-3xl">${cat.icon}</span>
                                    <span class="px-3 py-1 rounded-full text-xs font-bold ${STATUSES[report.status].bgColor} ${STATUSES[report.status].textColor}">${STATUSES[report.status].name}</span>
                                </div>
                                <h3 class="font-bold text-lg text-gray-800">${cat.name}</h3>
                                <p class="text-sm text-gray-600 mt-2">${report.description}</p>
                                <div class="mt-3 pt-3 border-t space-y-1 text-sm text-gray-600">
                                    <p class="flex items-center gap-2">📍 <span class="font-semibold text-gray-800">${report.address}</span></p>
                                    <p class="flex items-center gap-2">👤 ${report.reporterName}</p>
                                    <p class="flex items-center gap-2">📊 Risk Score: <span class="font-bold ${report.riskScore >= 70 ? 'text-red-600' : report.riskScore >= 40 ? 'text-orange-600' : 'text-green-600'}">${report.riskScore}/100</span></p>
                                </div>
                            </div>
                        `, { className: 'custom-popup', maxWidth: 320 });
                    markersRef.current.push(marker);
                });
            }, [reports]);

            return (
                <div className="space-y-6">
                    <div className="glass rounded-2xl shadow-xl p-6 scale-in">
                        <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center space-x-3">
                                <div className="w-12 h-12 bg-gradient-to-br from-cyan-500 to-blue-500 rounded-xl flex items-center justify-center shadow-lg">
                                    <span className="text-2xl">🗺️</span>
                                </div>
                                <div>
                                    <h2 className="text-xl font-bold text-gray-800">Bengaluru WASH Map</h2>
                                    <p className="text-sm text-gray-600 font-medium">Click markers to view report details{reports.some(r => r.photo) ? ' (with photos!)' : ''}</p>
                                </div>
                            </div>
                            <div className="flex flex-wrap gap-3">
                                <span className="px-4 py-2 rounded-full bg-red-50 text-red-700 font-semibold text-sm flex items-center gap-2 border border-red-200">
                                    <span className="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></span>Open: {reports.filter(r => r.status === 'OPEN').length}
                                </span>
                                <span className="px-4 py-2 rounded-full bg-orange-50 text-orange-700 font-semibold text-sm flex items-center gap-2 border border-orange-200">
                                    <span className="w-2.5 h-2.5 bg-orange-500 rounded-full"></span>Investigating: {reports.filter(r => r.status === 'INVESTIGATING').length}
                                </span>
                                <span className="px-4 py-2 rounded-full bg-green-50 text-green-700 font-semibold text-sm flex items-center gap-2 border border-green-200">
                                    <span className="w-2.5 h-2.5 bg-green-500 rounded-full"></span>Resolved: {reports.filter(r => r.status === 'RESOLVED').length}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div className="glass rounded-2xl shadow-xl p-4 scale-in">
                        <div id="map" className="h-[550px]"></div>
                    </div>
                    <div className="glass rounded-2xl shadow-xl p-6 slide-up">
                        <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                            <span className="text-xl">📋</span> Legend
                        </h3>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                            {Object.entries(CATEGORIES).map(([key, cat]) => (
                                <div key={key} className="flex items-center space-x-3 p-3 rounded-xl hover:bg-white/50 transition-all cursor-pointer">
                                    <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-md" style={{backgroundColor: cat.color + '20'}}>{cat.icon}</div>
                                    <span className="text-sm font-semibold text-gray-800">{cat.name}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ReportForm() {
            const { addReport, CATEGORIES, currentUser } = useContext(AppContext);
            const [category, setCategory] = useState('');
            const [description, setDescription] = useState('');
            const [address, setAddress] = useState('');
            const [photo, setPhoto] = useState(null);
            const [photoPreview, setPhotoPreview] = useState(null);
            const [isCompressing, setIsCompressing] = useState(false);
            const fileInputRef = useRef(null);

            const handlePhotoChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    alert('Please select a valid image file!');
                    return;
                }

                if (file.size > 10 * 1024 * 1024) {
                    alert('Image is too large! Please select an image under 10MB.');
                    return;
                }

                setIsCompressing(true);
                
                try {
                    const compressedBase64 = await compressImage(file, 500, 0.7);
                    setPhoto(compressedBase64);
                    setPhotoPreview(compressedBase64);
                } catch (error) {
                    console.error('Error processing image:', error);
                    alert('Error processing image. Please try again.');
                } finally {
                    setIsCompressing(false);
                }
            };

            const removePhoto = () => {
                setPhoto(null);
                setPhotoPreview(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!category || !description) { 
                    alert('Please fill all required fields!'); 
                    return; 
                }

                let finalPhoto = null;
                if (photo) {
                    setIsCompressing(true);
                    try {
                        finalPhoto = await compressImage(photo, 500, 0.7);
                    } catch (error) {
                        console.error('Error compressing final photo:', error);
                    }
                    setIsCompressing(false);
                }

                addReport({ 
                    category, 
                    description, 
                    address, 
                    photo: finalPhoto,
                    latitude: 12.9716 + (Math.random() - 0.5) * 0.2, 
                    longitude: 77.5946 + (Math.random() - 0.5) * 0.2 
                });
                
                setCategory('');
                setDescription('');
                setAddress('');
                setPhoto(null);
                setPhotoPreview(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                }
            };

            return (
                <div className="max-w-2xl mx-auto space-y-6">
                    <div className="glass rounded-2xl shadow-xl p-8 text-white relative overflow-hidden scale-in">
                        <div className="absolute inset-0 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
                        <div className="absolute inset-0 opacity-20">
                            <div className="absolute top-0 right-0 w-40 h-40 bg-white rounded-full -translate-y-1/2 translate-x-1/2"></div>
                            <div className="absolute bottom-0 left-0 w-32 h-32 bg-white rounded-full translate-y-1/2 -translate-x-1/2"></div>
                        </div>
                        <div className="relative flex items-center space-x-4">
                            <span className="text-6xl float">📝</span>
                            <div>
                                <h1 className="text-3xl font-bold">Report a WASH Issue</h1>
                                <p className="text-cyan-100 mt-1 font-medium">Help keep Bengaluru clean and safe!</p>
                            </div>
                        </div>
                    </div>
                    <form onSubmit={handleSubmit} className="glass rounded-2xl shadow-xl p-8 space-y-6 slide-up">

        // AI Chatbot - Rule-based responses
        const AI_RESPONSES = {
            greeting: [
                "Hello! I'm your WASH assistant. Ask me about water safety, hygiene, or sanitation issues.",
                "Hi! I can help with water quality, hygiene tips, and sanitation. What would you like to know?"
            ],
            water_safety: [
                "Boil water if it looks cloudy or has an unusual smell. Clear water from treated sources is usually safe.",
                "If water is brown or smells bad, don't drink it. Use bottled water or boil for 1 minute.",
                "Water tanks should be cleaned every 6 months. Dark or smelly water indicates contamination."
            ],
            contamination: [
                "Brown or discolored water often indicates rust or sediment. Avoid drinking until cleared.",
                "Chemical contamination may cause strong odors. Report to local water authority immediately.",
                "Algae blooms (green water) can be toxic. Avoid contact and report to authorities."
            ],
            hygiene: [
                "Wash hands with soap for 20+ seconds. Key times: after toilet, before eating, after touching waste.",
                "Keep toilet areas clean. Disinfect weekly with bleach solution (1 part bleach to 10 parts water).",
                "Don't share towels. Use separate or disposable paper towels in public facilities."
            ],
            sanitation: [
                "Open drainage is a health hazard. Contact BBMP (Bruhat Bengaluru Mahanagara Palike) to report.",
                "Blocked sewers cause disease spread. Report clogged drains immediately to prevent flooding.",
                "Public toilets should have soap, water, and toilet paper. Report missing supplies."
            ],
            health: [
                "Diarrhea from contaminated water usually resolves in 2-3 days. Drink clean fluids. Seek help if severe.",
                "Skin infections from dirty water need medical attention. Keep affected areas clean and dry.",
                "Mosquito breeding in stagnant water causes dengue/malaria. Eliminate standing water near your home."
            ],
            emergency: [
                "If you see dead animals or chemicals in water, don't use it. Report immediately to water authority.",
                "Flood water is contaminated. Don't wade through it. Move to higher ground and contact authorities.",
                "Sewage overflow is dangerous. Avoid contact, sanitize affected areas, report to BBMP."
            ],
            general: [
                "WASH = Water, Sanitation, and Hygiene. All three are essential for public health.",
                "Report WASH issues through the Report tab. Each report earns points and helps your community.",
                "Bengaluru faces water scarcity. Fix leaks, reuse grey water, and report wastage."
            ],
            water_sources: [
                "Bengaluru gets water from Cauvery river and borewells. Groundwater levels are declining.",
                "Tanker water should be stored in clean containers. Boil if unsure of source quality.",
                "Rainwater harvesting helps replenish groundwater. Consider installing a collection system."
            ]
        };

        function getAIResponse(message) {
            const lowerMsg = message.toLowerCase();
            
            if (lowerMsg.match(/^(hi|hello|hey|namaste|greetings)/)) {
                return AI_RESPONSES.greeting[Math.floor(Math.random() * AI_RESPONSES.greeting.length)];
            }
            if (lowerMsg.match(/brown|cloudy|smell|odor|discolored|taste/) && lowerMsg.match(/water|drink/)) {
                return AI_RESPONSES.water_safety[Math.floor(Math.random() * AI_RESPONSES.water_safety.length)];
            }
            if (lowerMsg.match(/contaminat|toxic|poison|chemical|industrial/)) {
                return AI_RESPONSES.contamination[Math.floor(Math.random() * AI_RESPONSES.contamination.length)];
            }
            if (lowerMsg.match(/wash.*hand|hand.*wash|soap|sanitizer|disinfect/)) {
                return AI_RESPONSES.hygiene[Math.floor(Math.random() * AI_RESPONSES.hygiene.length)];
            }
            if (lowerMsg.match(/toilet|bathroom|sewage|drain|garbage|trash/)) {
                return AI_RESPONSES.sanitation[Math.floor(Math.random() * AI_RESPONSES.sanitation.length)];
            }
            if (lowerMsg.match(/health|sick|diarrhea|disease|infection|vomit/) && lowerMsg.match(/water/)) {
                return AI_RESPONSES.health[Math.floor(Math.random() * AI_RESPONSES.health.length)];
            }
            if (lowerMsg.match(/emergenc|urgent|flood|dead.*animal|sewage.*overflow/)) {
                return AI_RESPONSES.emergency[Math.floor(Math.random() * AI_RESPONSES.emergency.length)];
            }
            if (lowerMsg.match(/bbmp|report|complain|authority/)) {
                return AI_RESPONSES.sanitation[Math.floor(Math.random() * AI_RESPONSES.sanitation.length)];
            }
            if (lowerMsg.match(/what.*is.*wash|explain.*wash|meaning.*wash/)) {
                return AI_RESPONSES.general[0];
            }
            if (lowerMsg.match(/water.*source|cauvery|borewell|groundwater|tanker|rain.*water/)) {
                return AI_RESPONSES.water_sources[Math.floor(Math.random() * AI_RESPONSES.water_sources.length)];
            }
            if (lowerMsg.match(/tip|hint|advice|how.*prevent|how.*avoid/)) {
                return AI_RESPONSES.hygiene[Math.floor(Math.random() * AI_RESPONSES.hygiene.length)];
            }
            
            return "I'm here to help with water safety, hygiene tips, and sanitation issues. Try asking about:\n• Water quality concerns\n• Hand washing techniques\n• Reporting WASH problems\n• Health symptoms from contaminated water\n• Emergency situations";
        }

        // Hygiene Tips Rotating Banner
        const HYGIENE_TIPS = [
            { icon: '🧼', tip: 'Wash hands for 20+ seconds with soap' },
            { icon: '💧', tip: 'Drink 8 glasses of clean water daily' },
            { icon: '🚽', tip: 'Keep toilet areas clean and disinfected' },
            { icon: '🗑️', tip: 'Dispose waste properly - no dumping in drains' },
            { icon: '🚿', tip: 'Take bath daily to maintain personal hygiene' },
            { icon: '🦟', tip: 'Eliminate stagnant water to prevent mosquito breeding' },
            { icon: '🥤', tip: 'Use clean containers for drinking water' },
            { icon: '🏊', tip: 'Avoid swimming in potentially contaminated water' },
            { icon: '👟', tip: 'Wear footwear near toilet areas to prevent infection' },
            { icon: '🧴', tip: 'Use hand sanitizer when soap is unavailable' },
            { icon: '💉', tip: 'Seek medical help if symptoms persist after 2 days' },
            { icon: '📢', tip: 'Report WASH issues to help your community' }
        ];

        function HygieneTips() {
            const [currentTip, setCurrentTip] = useState(0);
            
            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentTip(prev => (prev + 1) % HYGIENE_TIPS.length);
                }, 8000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="fixed bottom-0 left-0 right-0 bg-gradient-to-r from-cyan-600 to-blue-600 text-white py-3 px-6 shadow-2xl z-40">
                    <div className="max-w-7xl mx-auto flex items-center justify-center space-x-4">
                        <div className="text-3xl animate-pulse">{HYGIENE_TIPS[currentTip].icon}</div>
                        <p className="text-lg font-medium">{HYGIENE_TIPS[currentTip].tip}</p>
                        <div className="flex space-x-1">
                            {HYGIENE_TIPS.map((_, i) => (
                                <span key={i} className={`w-2 h-2 rounded-full ${i === currentTip ? 'bg-white' : 'bg-white/40'}`}></span>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ChatGPT-style Chatbot Component
        function ChatBot() {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: "Hello! I'm your WASH assistant. I can help with:\n• Water safety & quality\n• Hygiene tips\n• Sanitation issues\n• Health concerns\n\nWhat would you like to know?", time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
            ]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;

                const userMessage = { role: 'user', content: input, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsTyping(true);

                // Simulate AI thinking
                setTimeout(() => {
                    const response = getAIResponse(input);
                    setMessages(prev => [...prev, { role: 'assistant', content: response, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
                    setIsTyping(false);
                }, 800 + Math.random() * 700);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6 pb-24">
                    {/* Chat Header */}
                    <div className="glass rounded-2xl shadow-xl p-6 scale-in">
                        <div className="flex items-center space-x-4">
                            <div className="w-14 h-14 bg-gradient-to-br from-cyan-500 to-blue-500 rounded-2xl flex items-center justify-center shadow-lg">
                                <span className="text-2xl">💬</span>
                            </div>
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">WASH Assistant</h2>
                                <p className="text-sm text-gray-600 font-medium">Ask about water, hygiene, and sanitation</p>
                            </div>
                            <div className="ml-auto flex items-center space-x-2">
                                <span className="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                                <span className="text-sm font-semibold text-green-600">Online</span>
                            </div>
                        </div>
                    </div>

                    {/* Chat Messages */}
                    <div className="glass rounded-2xl shadow-xl overflow-hidden slide-up" style={{ height: '500px' }}>
                        <div className="h-full overflow-y-auto p-6 space-y-4 bg-gray-50">
                            {messages.map((msg, i) => (
                                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] rounded-2xl p-4 ${msg.role === 'user' 
                                        ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white rounded-br-md' 
                                        : 'bg-white shadow-md border border-gray-200 rounded-bl-md'}`}>
                                        <p className="text-sm whitespace-pre-wrap leading-relaxed">{msg.content}</p>
                                        <p className={`text-xs mt-2 ${msg.role === 'user' ? 'text-cyan-100' : 'text-gray-400'}`}>{msg.time}</p>
                                    </div>
                                </div>
                            ))}
                            
                            {isTyping && (
                                <div className="flex justify-start">
                                    <div className="bg-white shadow-md border border-gray-200 rounded-2xl rounded-bl-md p-4">
                                        <div className="flex space-x-1">
                                            <span className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></span>
                                            <span className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></span>
                                            <span className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></span>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            <div ref={chatEndRef} />
                        </div>
                        
                        {/* Input Area */}
                        <div className="p-4 bg-white border-t border-gray-200">
                            <div className="flex space-x-3">
                                <input 
                                    type="text" 
                                    value={input} 
                                    onChange={e => setInput(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                    placeholder="Ask about water safety, hygiene tips..."
                                    className="flex-1 px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 text-gray-800"
                                />
                                <button 
                                    onClick={handleSend}
                                    disabled={!input.trim()}
                                    className="btn-primary px-6 py-3 rounded-xl text-white font-bold shadow disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    Send
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Quick Questions */}
                    <div className="glass rounded-2xl shadow-xl p-6 slide-up">
                        <h3 className="font-bold text-gray-800 mb-4">Quick Questions</h3>
                        <div className="flex flex-wrap gap-2">
                            {[
                                "How to check water quality?",
                                "Hand washing tips",
                                "Report sanitation issue",
                                "Water contamination signs",
                                "Health symptoms from dirty water",
                                "Emergency water situation"
                            ].map((q, i) => (
                                <button 
                                    key={i}
                                    onClick={() => setInput(q)}
                                    className="px-4 py-2 bg-gradient-to-r from-gray-100 to-gray-50 rounded-xl text-sm font-medium text-gray-700 hover:from-cyan-100 hover:to-blue-100 hover:text-cyan-700 transition-all border border-gray-200 hover:border-cyan-300"
                                >
                                    {q}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function Profile() {
            const { currentUser, updateUser, BADGES } = useContext(AppContext);
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState(currentUser);
            const [profilePhoto, setProfilePhoto] = useState(null);
            const fileInputRef = useRef(null);

            const handlePhotoChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    alert('Please select a valid image file!');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    setProfilePhoto(e.target.result);
                    setFormData(prev => ({ ...prev, photo: e.target.result }));
                };
                reader.readAsDataURL(file);
            };

            const handleSave = () => {
                updateUser(formData);
                setIsEditing(false);
            };

            const handleCancel = () => {
                setFormData(currentUser);
                setProfilePhoto(null);
                setIsEditing(false);
            };

            return (
                <div className="max-w-3xl mx-auto space-y-6">
                    {/* Profile Header */}
                    <div className="glass rounded-2xl shadow-xl p-8 scale-in">
                        <div className="flex items-start space-x-6">
                            {/* Profile Photo */}
                            <div className="relative">
                                <div className="w-32 h-32 rounded-2xl overflow-hidden shadow-xl border-4 border-cyan-200 bg-gradient-to-br from-cyan-400 to-blue-500 flex items-center justify-center">
                                    {profilePhoto || currentUser.photo ? (
                                        <img src={profilePhoto || currentUser.photo} alt="Profile" className="w-full h-full object-cover" />
                                    ) : (
                                        <span className="text-6xl">👤</span>
                                    )}
                                </div>
                                {isEditing && (
                                    <>
                                        <input 
                                            type="file" 
                                            accept="image/*"
                                            ref={fileInputRef}
                                            onChange={handlePhotoChange}
                                            style={{ display: 'none' }}
                                        />
                                        <button
                                            onClick={() => fileInputRef.current?.click()}
                                            className="absolute bottom-0 right-0 w-10 h-10 bg-cyan-500 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-cyan-600 transition-colors text-lg font-bold"
                                        >
                                            📷
                                        </button>
                                    </>
                                )}
                            </div>

                            {/* User Info */}
                            <div className="flex-1">
                                {isEditing ? (
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-800 mb-2">Full Name</label>
                                            <input 
                                                type="text" 
                                                value={formData.name}
                                                onChange={e => setFormData({...formData, name: e.target.value})}
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800 font-semibold"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-800 mb-2">Bio</label>
                                            <textarea 
                                                value={formData.bio || ''}
                                                onChange={e => setFormData({...formData, bio: e.target.value})}
                                                rows={2}
                                                className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800"
                                            />
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        <h2 className="text-3xl font-bold text-gray-800">{currentUser.name}</h2>
                                        <p className="text-gray-600 font-medium mt-1">{currentUser.bio || 'No bio added yet'}</p>
                                        <div className="flex items-center gap-4 mt-3 text-gray-700 font-medium">
                                            <span className="flex items-center gap-1">📅 Joined {currentUser.joinedDate}</span>
                                            <span className="flex items-center gap-1">📍 {currentUser.location}</span>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        {/* Stats */}
                        <div className="grid grid-cols-4 gap-4 mt-6 pt-6 border-t-2 border-gray-200">
                            <div className="text-center p-4 bg-gradient-to-br from-cyan-50 to-blue-50 rounded-xl border border-cyan-200">
                                <p className="text-3xl font-bold text-cyan-700">{currentUser.points}</p>
                                <p className="text-sm font-semibold text-cyan-600">Points</p>
                            </div>
                            <div className="text-center p-4 bg-gradient-to-br from-green-50 to-emerald-50 rounded-xl border border-green-200">
                                <p className="text-3xl font-bold text-green-700">{currentUser.reportsCount}</p>
                                <p className="text-sm font-semibold text-green-600">Reports</p>
                            </div>
                            <div className="text-center p-4 bg-gradient-to-br from-yellow-50 to-orange-50 rounded-xl border border-yellow-200">
                                <p className="text-3xl font-bold text-yellow-700">{currentUser.badges.length}</p>
                                <p className="text-sm font-semibold text-yellow-600">Badges</p>
                            </div>
                            <div className="text-center p-4 bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl border border-purple-200">
                                <p className="text-3xl font-bold text-purple-700">{Math.round(currentUser.points / 10)}</p>
                                <p className="text-sm font-semibold text-purple-600">Impact</p>
                            </div>
                        </div>

                        {/* Badges */}
                        <div className="mt-6 pt-6 border-t-2 border-gray-200">
                            <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                                <span>🏅</span> Your Badges
                            </h3>
                            <div className="flex flex-wrap gap-3">
                                {currentUser.badges.map((badge, i) => (
                                    <div key={i} className="flex items-center space-x-2 px-4 py-2 bg-gradient-to-r from-cyan-50 to-blue-50 rounded-xl border border-cyan-200">
                                        <span className="text-2xl">{BADGES[badge]?.icon}</span>
                                        <span className="font-semibold text-gray-800">{BADGES[badge]?.name}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Edit Button */}
                        <div className="mt-6">
                            {isEditing ? (
                                <div className="flex gap-3">
                                    <button onClick={handleSave} className="btn-primary flex-1 py-3 rounded-xl text-white font-bold text-lg shadow">
                                        💾 Save Changes
                                    </button>
                                    <button onClick={handleCancel} className="btn-secondary px-6 py-3 rounded-xl text-white font-bold text-lg shadow">
                                        Cancel
                                    </button>
                                </div>
                            ) : (
                                <button onClick={() => setIsEditing(true)} className="w-full btn-primary py-3 rounded-xl text-white font-bold text-lg shadow">
                                    ✏️ Edit Profile
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Contact Information */}
                    <div className="glass rounded-2xl shadow-xl p-8 slide-up">
                        <h3 className="font-bold text-gray-800 text-xl mb-6 flex items-center gap-2">
                            <span>📋</span> Contact Information
                        </h3>
                        <div className="space-y-4">
                            {isEditing ? (
                                <>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-800 mb-2">Email</label>
                                        <input 
                                            type="email" 
                                            value={formData.email}
                                            onChange={e => setFormData({...formData, email: e.target.value})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-800 mb-2">Phone</label>
                                        <input 
                                            type="tel" 
                                            value={formData.phone}
                                            onChange={e => setFormData({...formData, phone: e.target.value})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-800 mb-2">Location</label>
                                        <input 
                                            type="text" 
                                            value={formData.location}
                                            onChange={e => setFormData({...formData, location: e.target.value})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 text-gray-800"
                                        />
                                    </div>
                                </>
                            ) : (
                                <>
                                    <div className="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-200">
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">📧</span>
                                            <span className="font-semibold text-gray-800">Email</span>
                                        </div>
                                        <span className="text-gray-700 font-medium">{currentUser.email}</span>
                                    </div>
                                    <div className="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-200">
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">📱</span>
                                            <span className="font-semibold text-gray-800">Phone</span>
                                        </div>
                                        <span className="text-gray-700 font-medium">{currentUser.phone}</span>
                                    </div>
                                    <div className="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-200">
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">📍</span>
                                            <span className="font-semibold text-gray-800">Location</span>
                                        </div>
                                        <span className="text-gray-700 font-medium">{currentUser.location}</span>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('map');
            return (
                <AppProvider>
                    <div className="min-h-screen">
                        <Header activeTab={activeTab} setActiveTab={setActiveTab} />
                        <main className="max-w-7xl mx-auto px-4 py-8">
                            <div className="fade-in">
                                {activeTab === 'map' && <MapView />}
                                {activeTab === 'report' && <ReportForm />}
                                {activeTab === 'dashboard' && <Dashboard />}
                                {activeTab === 'leaderboard' && <Leaderboard />}
                                {activeTab === 'chat' && <ChatBot />}
                                {activeTab === 'profile' && <Profile />}
                            </div>
                        </main>
                        <HygieneTips />
                        <footer className="text-center py-6 text-gray-600 text-sm font-medium">
                            <p>Built with 💙 for Bengaluru's Water & Sanitation | AquaWatch © 2024</p>
                        </footer>
                    </div>
                </AppProvider>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
